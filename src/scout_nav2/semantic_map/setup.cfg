[develop]
script_dir=$base/lib/semantic_map
[install]
install_scripts=$base/lib/semantic_map
[tool:pytest]
# google-genai (language_goal) pulls in a newer anyio whose pytest plugin needs
# pytest>=7; this machine has system pytest 6.2.5, so the plugin crashes
# collection for every package. Disabling just that plugin is harmless where
# anyio/pytest are compatible.
addopts = -p no:anyio
