[develop]
script_dir=$base/lib/language_goal
[install]
install_scripts=$base/lib/language_goal
[tool:pytest]
# google-genai pulls in a newer anyio whose pytest plugin requires pytest>=7;
# this machine has system pytest 6.2.5, so the plugin crashes collection.
# Disabling just that plugin is harmless where anyio/pytest are compatible.
addopts = -p no:anyio
